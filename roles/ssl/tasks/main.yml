---
- name: Install openssl
  ansible.builtin.dnf:
    name: openssl
    state: present

- name: Ensure SSL directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/ssl/certs
    - /etc/ssl/private

- name: Generate self-signed SSL certificate
  ansible.builtin.command:
    cmd: >
      openssl req -x509 -nodes -days 365 -newkey rsa:2048
      -keyout /etc/ssl/private/wordpress.key
      -out /etc/ssl/certs/wordpress.crt
      -subj "/CN=WordPress Server"
    creates: /etc/ssl/certs/wordpress.crt

- name: Set permissions on SSL private key
  ansible.builtin.file:
    path: /etc/ssl/private/wordpress.key
    mode: '0600'
